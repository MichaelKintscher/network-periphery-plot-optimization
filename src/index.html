<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Periphery Plot</title>

    <!-- JQuery dependency via CDN -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

    <!-- Bootstrap dependency via CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js" integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q" crossorigin="anonymous"></script>

    <!-- Local Files -->
    <link rel="stylesheet" href="./styles.css">
    <script src="./main.js" type="module"></script>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Network Periphery Plot</a>
        </div>
    </nav>
    <div class="container">
        <div class="row">
            <div class="col-md-9">
                <div id="chart-wrapper">
                    <!-- Chart is appended here -->
                </div>
            </div>
            <div id="control-panel-div" class="col-md-3">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Benchmarking</h5>
                        <div>
                            <label for="benchmark-iterations-input" class="form-label">Number of Iterations</label>
                            <input type="range" id="benchmark-iterations-input" class="form-range" min="1" max="100" value="10">
                            <output id="benchmark-iterations-output" for="benchmark-iterations-input" aria-hidden="true"></output>
                        </div>
                        <button id="benchmark-run-btn" class="btn btn-primary">Run</button>
                        <button id="benchmark-clear-btn" class="btn btn-primary">Clear</button>
                        <button id="benchmark-export-btn" class="btn btn-primary">Export</button>
                        <p id="benchmark-message" class="card-text">Results</p>
                        <div id="benchmark-results-chart-wrapper">
                            <!-- Benchmark results chart is appended here -->
                        </div>
                    </div>
                </div>
                <div id="chart-settings-card" class="card">
                    <div class="card-body">
                        <h5 class="card-title">Chart Settings</h5>
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" role="switch" id="show-periphery-plot-switch">
                            <label class="form-check-label" for="show-periphery-plot-switch">Show Periphery Plot</label>
                        </div>
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" role="switch" id="show-edges-switch">
                            <label class="form-check-label" for="show-edges-switch">Show Graph Edges</label>
                        </div>
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" role="switch" id="show-delaunay-switch">
                            <label class="form-check-label" for="show-delaunay-switch">Show Delaunay Triangulation</label>
                        </div>
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" role="switch" id="show-intersections-switch">
                            <label class="form-check-label" for="show-intersections-switch">Show Intersections</label>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
